services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: homegroup
      POSTGRES_USER: homegroup
      POSTGRES_PASSWORD: homegroup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homegroup -d homegroup"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
    command: ["uv", "run", "homegroup", "serve", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:18080:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backups:/app/backups
    restart: unless-stopped

  worker:
    build:
      context: ..
    command: ["uv", "run", "homegroup", "worker"]
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backups:/app/backups
    restart: unless-stopped

volumes:
  postgres_data:
  backups:
