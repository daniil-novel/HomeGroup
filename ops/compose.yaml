services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: homegroup
      POSTGRES_USER: homegroup
      POSTGRES_PASSWORD: homegroup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homegroup -d homegroup"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
    command: ["uv", "run", "homegroup", "serve", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backups:/app/backups
    restart: unless-stopped

  worker:
    build:
      context: ..
    command: ["uv", "run", "homegroup", "worker"]
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backups:/app/backups
    restart: unless-stopped

  caddy:
    image: caddy:2.10
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  backups:
  caddy_data:
  caddy_config:

